name: Check Website Files

on:
  push:
    branches: [main]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check index.html
        run: test -f electro-main/index.html

      - name: Check style.css
        run: test -f electro-main/style.css