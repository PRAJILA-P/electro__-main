name: Normal Static Website

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List project files
        run: ls -la

      - name: Build
        run: echo "No build required for a static HTML website."

      - name: Test
        run: echo "No tests available."

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest  

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Docker Login to Docker Hub
      run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_TOKEN }}"

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/electro:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/electro:latest
         